<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IFRS17 RAG Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202a;
        background: #eef2f5;
      }

      body {
        margin: 0;
      }

      main {
        display: grid;
        gap: 16px;
        width: min(760px, calc(100% - 32px));
        margin: 12vh auto;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 7vw, 4.5rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #5c6673;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        width: fit-content;
        border-radius: 6px;
        padding: 12px 16px;
        background: #146c94;
        color: #fff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>IFRS17 RAG</h1>
      <p>Open the static IFRS17 evidence retrieval demo.</p>
      <a href="./ifrs17-demo/">Open demo</a>
    </main>
  </body>
</html>
